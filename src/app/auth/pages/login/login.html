<div class="container-fluid vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="card shadow-lg border-0" style="max-width: 400px; width: 100%; border-radius: 1rem;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-person-circle fs-1 text-primary"></i>
                <h2 class="fw-bold mt-2">Welcome Back</h2>
                <p class="text-muted">Please enter your details</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control form-control-lg" id="email" placeholder="name@example.com"
                        formControlName="email"
                        [ngClass]="{'is-invalid': loginForm.get('email')?.touched && loginForm.get('email')?.invalid}">
                    <div class="invalid-feedback">
                        Please enter a valid email address.
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control form-control-lg" id="password" placeholder="••••••••"
                        formControlName="password"
                        [ngClass]="{'is-invalid': loginForm.get('password')?.touched && loginForm.get('password')?.invalid}">
                    <div class="invalid-feedback">
                        Password must be at least 6 characters.
                    </div>
                </div>

                <div class="d-grid shadow-sm">
                    <button type="submit" class="btn btn-primary btn-lg"
                        [disabled]="loginForm.invalid && loginForm.touched">
                        Sign In
                    </button>
                </div>

                <div class="text-center mt-4">
                    <p class="small text-muted mb-0">Don't have an account? <a routerLink="/auth/register"
                            class="text-primary text-decoration-none fw-bold">Sign up</a></p>
                </div>
            </form>
        </div>
    </div>
</div>
