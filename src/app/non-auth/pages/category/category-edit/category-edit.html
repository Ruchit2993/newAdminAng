<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-header">
                <h5>{{ isEditMode ? 'Edit Category' : 'Add Category' }}</h5>
            </div>
            <div class="card-body">
                <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">

                    <div class="form-group mb-3">
                        <div class="row align-items-start">
                            <label for="name" class="fw-bold col-3">Name :</label>
                            <div class="col-9">
                                <input type="text" class="form-control" id="name" formControlName="name"
                                    [ngClass]="{ 'is-invalid': submitted && f['name'].errors }"
                                    placeholder="Enter category name" />
                                @if (submitted && f['name'].errors) {
                                <div class="invalid-feedback d-block">
                                    @if (f['name'].errors?.['required']) {
                                    <div>Name is required</div>
                                    }
                                </div>
                                }
                            </div>
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <div class="row align-items-start">
                            <label class="fw-bold col-3">Category Image:</label>

                            <div class="d-flex align-items-center col-9">

                                <input type="file" #fileUpload class="d-none" (change)="onFileChange($event)"
                                    accept="image/*">

                                <button type="button" class="btn btn-info" (click)="fileUpload.click()">
                                    <i class="bi bi-upload me-1"></i> Choose Image
                                </button>

                                @if (imagePreview) {
                                <div class="position-relative ms-3">
                                    <img [src]="imagePreview" alt="Preview" class="rounded border shadow-sm"
                                        style="width: 100px; height: 100px; object-fit: cover; display: block;">

                                    <button type="button"
                                        class="btn btn-danger btn-sm p-0 position-absolute d-flex align-items-center justify-content-center"
                                        style="top: 50%; right: -35px; transform: translateY(-50%); width: 20px; height: 20px;"
                                        (click)="removeImage()">
                                        <span class="fa fa-trash" style="font-size: 12px;"></span>
                                    </button>
                                </div>
                                } @else {
                                <span class="text-muted ms-2 small fst-italic">No file chosen</span>
                                }
                            </div>

                            @if (submitted && f['image'].errors?.['required']) {
                            <div class="text-danger small mt-1">
                                <i class="bi bi-exclamation-circle me-1"></i> Image is required
                            </div>
                            }
                        </div>
                    </div>
                    <div class="form-group mb-4">
                        <div class="row align-items-start">
                            <label class="fw-bold col-3">Status :</label>
                            <div class="col-9">
                                <div class="custom-control custom-radio custom-control-inline d-inline-block me-3">
                                    <input type="radio" id="statusActive" name="status"
                                        class="custom-control-input me-1" value="Active" formControlName="status" />
                                    <label class="custom-control-label" for="statusActive">Active</label>
                                </div>
                                <div class="custom-control custom-radio custom-control-inline d-inline-block">
                                    <input type="radio" id="statusInactive" name="status"
                                        class="custom-control-input me-1" value="Inactive" formControlName="status" />
                                    <label class="custom-control-label" for="statusInactive">Inactive</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" class="btn btn-danger ms-2" (click)="resetForm()">Reset</button>
                    <button type="button" class="btn btn-secondary ms-2" [routerLink]="['/category']">Cancel</button>
                </form>
            </div>
        </div>
    </div>
</div>
