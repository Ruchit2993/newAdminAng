<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-header">
                <h5>{{ isEditMode ? 'Edit Category' : 'Add Category' }}</h5>
            </div>
            <div class="card-body">
                <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" class="form-control" id="name" formControlName="name"
                            [ngClass]="{ 'is-invalid': submitted && f['name'].errors }"
                            placeholder="Enter category name" />
                        <div *ngIf="submitted && f['name'].errors" class="invalid-feedback">
                            <div *ngIf="f['name'].errors['required']">Name is required</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="image">Image</label>
                        <input type="file" class="form-control" id="image" (change)="onFileChange($event)" />
                        <small class="form-text text-muted">Upload an image for the category.</small>

                        <div *ngIf="imagePreview" class="mt-2">
                            <img [src]="imagePreview" alt="Category Preview" class="img-thumbnail"
                                style="max-height: 200px;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="d-block">Status</label>
                        <div class="custom-control custom-radio custom-control-inline">
                            <input type="radio" id="statusActive" name="status" class="custom-control-input"
                                value="Active" formControlName="status" />
                            <label class="custom-control-label" for="statusActive">Active</label>
                        </div>
                        <div class="custom-control custom-radio custom-control-inline">
                            <input type="radio" id="statusInactive" name="status" class="custom-control-input"
                                value="Inactive" formControlName="status" />
                            <label class="custom-control-label" for="statusInactive">Inactive</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" class="btn btn-secondary ml-2" [routerLink]="['/category']">Cancel</button>
                </form>
            </div>
        </div>
    </div>
</div>
