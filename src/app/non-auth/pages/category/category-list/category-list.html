<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5>Category List</h5>
                <button [routerLink]="['/category/add']" class="btn btn-primary btn-sm">Add Category</button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let category of categories; let i = index">
                                <td>{{ i + 1 }}</td>
                                <td>{{ category.name }}</td>
                                <td>
                                    <span class="badge"
                                        [ngClass]="category.status === 1 || category.status === '1' || category.status === 'Active' ? 'bg-success' : 'bg-danger'">
                                        {{ (category.status === 1 || category.status === '1') ? 'Active' : 'Inactive' }}
                                    </span>
                                </td>
                                <td>
                                    <button [routerLink]="['/category/edit', category.id]"
                                        class="btn btn-info btn-sm mr-2">
                                        <i class="feather icon-edit"></i> Edit
                                    </button>
                                    <button (click)="openDeleteModal(category.id!)" class="btn btn-danger btn-sm">
                                        <i class="feather icon-trash"></i> Delete
                                    </button>
                                </td>
                            </tr>
                            <tr *ngIf="categories.length === 0">
                                <td colspan="4" class="text-center">No categories found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Inline Delete Confirmation Modal -->
<div class="modal fade" tabindex="-1" role="dialog" [ngClass]="{'show': showDeleteModal}"
    [style.display]="showDeleteModal ? 'block' : 'none'"
    [style.background]="showDeleteModal ? 'rgba(0,0,0,0.5)' : 'none'" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="close" (click)="closeDeleteModal()" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this category?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" (click)="closeDeleteModal()">Cancel</button>
                <button type="button" class="btn btn-danger" (click)="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>
</div>
